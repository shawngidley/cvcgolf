[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Runs at :00 and :30 to catch all reminder time slots including 11:30 PM
[functions."send-reminders"]
  schedule = "0,30 * * * *"

# Auto-activate tournament when first_tee_time passes — runs every hour on Thursdays
[functions."activate-tournament"]
  schedule = "0 * * * 4"

# Sync first tee time from ESPN every Wednesday at 1pm ET (17:00 UTC)
# Falls back to 7am ET if ESPN tee times not posted yet
[functions."sync-tee-time"]
  schedule = "0 17 * * 3"

# Auto-finalize: every 15 min from 6 PM ET Sunday to 1 AM ET Monday
# EDT: 6 PM ET = 22:00 UTC, 1 AM ET = 05:00 UTC next day
# Runs Sunday 22:00-23:59 UTC and Monday 00:00-05:00 UTC
# Skips automatically if no current tournament or already finalized
[functions."auto-finalize"]
  schedule = "*/15 0-5,22-23 * * 0,1"
