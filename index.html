<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVC Fantasy Golf 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-badge">CVC</div>
        <h1>Fantasy Golf</h1>
        <p class="season-label">2026 Season</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="playerName">Player</label>
          <select id="playerName" required>
            <option value="">Select your name...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
        <p class="login-error" id="loginError" style="display:none;"></p>
      </form>
      <p class="login-footer">14 Players &bull; 27 Tournaments &bull; $100 Salary Cap</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
