<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVC Fantasy Golf 2026</title>
  <link rel="icon" type="image/png" href="/CVC_Golf_Logo.png">
  <style>
    body { margin: 0; background: #1a3d1a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    .loader { color: #d4af37; font-size: 1.1rem; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="loader">Loading&hellip;</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (async () => {
      try {
        const sb = window.supabase.createClient(
          'https://iqahjyoytzhhkvwmujha.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxYWhqeW95dHpoaGt2d211amhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjkwNTgsImV4cCI6MjA5MTE0NTA1OH0.kki64pr4YG3aQufc3n4nn2KDpmzURYDLx7_zYneoyKY'
        );
        const { data } = await sb
          .from('tournaments')
          .select('first_tee_time, picks_locked, is_complete, start_date')
          .eq('is_current', true)
          .limit(1)
          .single();

        let isLive = false;
        if (data && !data.is_complete) {
          const lockDate = data.first_tee_time
            ? new Date(data.first_tee_time)
            : new Date(data.start_date + 'T00:00:00');
          isLive = data.picks_locked || new Date() >= lockDate;
        }

        window.location.replace(isLive ? 'live.html' : 'standings.html');
      } catch (e) {
        window.location.replace('standings.html');
      }
    })();
  </script>
</body>
</html>
